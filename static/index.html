<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Multi-Client Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .card { background: #1e293b; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .log-container { height: 300px; overflow-y: auto; background: #020617; font-family: monospace; font-size: 0.875rem; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <h1 class="text-3xl font-bold text-blue-400">🚀 WhatsApp Report Manager</h1>
            <div class="text-sm text-slate-400">API Port: 3000</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Panel de Colegios -->
            <div class="md:col-span-1 card p-6">
                <h2 class="text-xl font-semibold mb-4 border-b border-slate-700 pb-2">Colegios</h2>
                
                <div class="flex gap-2 mb-6">
                    <input type="text" id="newClient" placeholder="Nombre del colegio..." 
                           class="flex-1 bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                    <button onclick="addClient()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm font-medium transition">Añadir</button>
                </div>

                <div id="clientList" class="space-y-3">
                    <!-- Los colegios se cargarán aquí -->
                    <div class="text-slate-500 text-center py-4">Cargando colegios...</div>
                </div>
            </div>

            <!-- Panel de Logs -->
            <div class="md:col-span-2 card p-6">
                <h2 class="text-xl font-semibold mb-4 border-b border-slate-700 pb-2">Consola de Eventos</h2>
                <div id="logs" class="log-container p-4 rounded border border-slate-800 space-y-1">
                    <div class="text-blue-500">[SISTEMA] Listo. Esperando acciones...</div>
                </div>
                <div class="mt-4 flex justify-end">
                    <button onclick="clearLogs()" class="text-xs text-slate-500 hover:text-slate-300">Limpiar Consola</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async def fetchClients() {
            try {
                const response = await fetch('/sessions');
                const sessions = await response.json();
                const container = document.getElementById('clientList');
                container.innerHTML = '';
                
                if (sessions.length === 0) {
                    container.innerHTML = '<div class="text-slate-500 text-center py-4 text-sm">No hay colegios aún</div>';
                    return;
                }

                sessions.forEach(name => {
                    const div = document.createElement('div');
                    div.className = 'flex justify-between items-center p-3 bg-slate-800 rounded border border-slate-700';
                    div.innerHTML = `
                        <span class="font-medium text-sm">${name}</span>
                        <div class="flex gap-2">
                            <button onclick="authClient('${name}')" class="text-xs bg-emerald-600 hover:bg-emerald-500 px-3 py-1 rounded transition">LOGIN</button>
                            <button onclick="deleteClient('${name}')" class="text-xs bg-slate-700 hover:bg-red-900 px-2 py-1 rounded transition">X</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (e) { addLog('Error cargando colegios', 'error'); }
        }

        async function addClient() {
            const input = document.getElementById('newClient');
            const name = input.value.trim();
            if (!name) return;
            
            addLog(`Añadiendo colegio: ${name}...`);
            await fetch(`/auth/${name}`);
            input.value = '';
            fetchClients();
        }

        async function authClient(name) {
            addLog(`Abriendo navegador para ${name}...`);
            const response = await fetch(`/auth/${name}`);
            const data = await response.json();
            addLog(`✅ ${data.message}`);
        }

        function addLog(msg, type = 'info') {
            const logs = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.className = type === 'error' ? 'text-red-400' : 'text-slate-300';
            div.innerHTML = `<span class="text-slate-600">[${time}]</span> ${msg}`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        }

        function clearLogs() { document.getElementById('logs').innerHTML = ''; }

        // Carga inicial
        fetchClients();
        // Polling para refrescar la lista cada 5 segundos
        setInterval(fetchClients, 5000);
    </script>
</body>
</html>
